    vid: "0x0300"
    pid: "0x1002"
    keys: 15
    encoders: 0
    status: functional
    capabilities: [display, rgb, macros, firmware]
    protocol_doc: docs/protocols/streamdeck/akp153.md
    notes: "Same protocol family as AKP153."

  - codename: akp03
    family: streamdeck
    name: "AJAZZ AKP03 / Mirabox N3"
