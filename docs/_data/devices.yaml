# =============================================================================
# Single source of truth for device support data.
#
# Every table or list in README.md / docs/wiki/Supported-Devices.md that
# mentions device status, USB IDs, features, or capabilities is GENERATED
# from this file by `scripts/generate-docs.py`.
#
# To update the public-facing docs:
#   1. Edit this file (or just add a new entry at the bottom).
#   2. Run `make docs` (or let the pre-commit hook / CI do it for you).
#
# Never hand-edit the AUTOGEN blocks in README.md or the wiki — any manual
# change there will be overwritten at the next sync.
# =============================================================================

# status buckets — order controls table sort + legend order
statuses:
  stable: { emoji: "🟢", label: "stable", description: "every vendor feature works" }
  functional: { emoji: "🟢", label: "functional", description: "core I/O works (keys/LEDs)" }
  scaffolded: { emoji: "🟡", label: "scaffolded", description: "enumerated, protocol being mapped" }
  requested: { emoji: "🟠", label: "requested", description: "captures wanted" }

# capability keys → human label (used in feature matrix)
capabilities:
  display: "Per-key display"
  rgb: "RGB backlight"
  encoder: "Encoder / dial"
  touch: "Touch strip"
  macros: "Macros"
  dpi: "DPI stages"
  layers: "Layers"
  firmware: "Firmware version"
  clock: "Host-settable clock (scaffolded)"

