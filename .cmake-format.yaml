format:
  line_width: 100
  tab_size: 4
  max_subgroups_hwrap: 3
  max_pargs_hwrap: 6
  dangle_parens: true
  min_prefix_chars: 4
  max_prefix_chars: 10
  separate_ctrl_name_with_space: false
  separate_fn_name_with_space: false
  command_case: canonical
  keyword_case: upper

markup:
  bullet_char: "-"
  enum_char: "."
  first_comment_is_literal: true

parse:
  additional_commands:
    qt_standard_project_setup:
      kwargs:
        REQUIRES: 1
    qt_add_executable:
      pargs: 1
      flags: [WIN32, MACOSX_BUNDLE]
      kwargs:
        MANUAL_FINALIZATION: 1
    qt_add_qml_module:
      pargs: 1
      kwargs:
        URI: 1
        VERSION: 1
        QML_FILES: '+'
        SOURCES: '+'
        RESOURCES: '+'
