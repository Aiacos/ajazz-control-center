# typos configuration — spell-check code, comments and docs.
[default]
extend-ignore-identifiers-re = [
    # Hex constants and 4-byte magic literals.
    "[0-9a-fA-F]{6,}",
    # Image-format plurals: typos otherwise rewrites "PNGs" → "ONGs"
    # because it locks onto "NGs" as a known misspelling. We tell it to
    # leave the whole token alone instead.
    "^[A-Z]{2,5}s$",
]

[default.extend-words]
# Domain vocabulary that is NOT a typo.
AJAZZ    = "AJAZZ"
Mirabox  = "Mirabox"
hidraw   = "hidraw"
hidapi   = "hidapi"
udev     = "udev"
libudev  = "libudev"
QMK      = "QMK"
VIA      = "VIA"
# AJAZZ keyboard SKU prefix (AKS068, AKS075, …) — typos otherwise rewrites
# the literal "AKS" to "ASK" thinking it's an English word.
AKS      = "AKS"
AKS068   = "AKS068"
AKS075   = "AKS075"
pybind   = "pybind"
Aiacos   = "Aiacos"
Argentieri = "Argentieri"
# Qt MOC macro; typos keeps proposing INVOCABLE which does not exist.
INVOKABLE = "INVOKABLE"
Invokable = "Invokable"
invokable = "invokable"
# Lift-off distance command abbreviation used in the AJ mouse protocol.
Lod = "Lod"
kCmdLod = "kCmdLod"
# Plugin SDK / supply-chain vocabulary used in the architecture docs.
Sigstore = "Sigstore"
sigstore = "sigstore"
Fulcio   = "Fulcio"
Rekor    = "Rekor"
bwrap    = "bwrap"
bubblewrap = "bubblewrap"
OpenDeck = "OpenDeck"
opendeck = "opendeck"
streamdeck = "streamdeck"
StreamDeck = "StreamDeck"
seccomp  = "seccomp"
AppContainer = "AppContainer"
WebView2 = "WebView2"
WKWebView = "WKWebView"
QtWebEngine = "QtWebEngine"

[files]
extend-exclude = [
    "build/**",
    "dist/**",
    "_deps/**",
    "docs/protocols/captures/**",
    "*.pcapng",
    "*.svg",
    "resources/icons/*",
    "python/ajazz_plugins/examples/**/assets/**",
]
