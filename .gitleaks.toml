# Gitleaks configuration for AJAZZ Control Center.
#
# Strategy: extend the upstream default rule set (so AWS keys, GitHub PATs,
# Slack webhooks etc. still trigger), with a root-level allowlist for
# false-positive patterns:
#
#   1. QSettings key string literals like "battery/poll-enabled" — these are
#      application settings paths, NOT secrets, but they sometimes cross the
#      default `generic-api-key` entropy threshold.
#   2. Vendor-RE documentation under docs/protocols/ that catalogues
#      high-entropy hex constants (e.g., the AES-GCM key extracted from
#      Stream Dock AJAZZ.exe per akp_dfu_protocol.md). These are documented
#      as security FINDINGS, NOT distributed secrets — they exist in the
#      vendor binary itself and our docs cite them for audit-trail clarity.
#
# This file is loaded automatically by the gitleaks GitHub Action when
# present at the repo root.

[extend]
useDefault = true

[allowlist]
description = "QSettings literals + vendor-RE documentation"
paths = [
    '''docs/protocols/.*\.md''',
    '''docs/research/clean-reimplementation-roadmap\.md''',
    '''docs/research/phase3-patch-sequence\.md''',
]
regexes = [
    '''kSettingsKey\s*=\s*"[A-Za-z0-9._/-]+"''',
]
