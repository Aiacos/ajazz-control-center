# ============================================================================
# Pre-commit hooks — run automatically on every `git commit`.
#
# Install once per clone:
#   pipx install pre-commit        # or: pip install --user pre-commit
#   pre-commit install             # sets up the git hook
#   pre-commit install --hook-type commit-msg
#
# Run manually across the whole tree:
#   pre-commit run --all-files
#
# `make bootstrap` already does `pre-commit install` for you.
# ============================================================================

default_language_version:
  python: python3

# Skip huge auto-generated artifacts + reference material.
exclude: |
  (?x)^(
      build/.*|
      dist/.*|
      \.venv/.*|
      docs/protocols/captures/.*|
      .*\.pcapng|
      .*\.min\.(js|css)
  )$

repos:
  # --------------------------------------------------------------------------
  # Hygiene: trailing whitespace, EOF newlines, large files, merge conflicts.
  # --------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-added-large-files
        args: [--maxkb=2048]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-symlinks
      - id: destroyed-symlinks
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-yaml
        args: [--unsafe]   # allow !reference, GitHub Actions syntax
      - id: check-json
      - id: check-toml

  # --------------------------------------------------------------------------
  # C++ — clang-format (format) + clang-tidy (static analysis).
  # clang-format auto-fixes; clang-tidy only reports in the pre-commit hook
  # and runs a full pass in CI.
  # --------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: dd18dad857d6133e90bbe478f4f2f22ec0030269  # frozen: v22.1.5
    hooks:
      - id: clang-format
        types_or: [c++, c]
        args: [-i, --style=file]

  # clang-tidy: static analyser. Runs on `pre-commit run --hook-stage manual`
  # (or `make tidy`) for ad-hoc invocations, AND automatically on `git push`
  # via the `pre-push` stage so contributors catch issues before CI does.
  # Skipped by default in the cheap `pre-commit` (per-commit) stage because it
  # requires a configured CMake build directory and can take 10-30 seconds.
  # The hook honours .clang-tidy at the repo root.
  - repo: local
    hooks:
      - id: clang-tidy
        name: clang-tidy (manual / pre-push)
        stages: [manual, pre-push]
        language: system
        types_or: [c++, c]
        entry: scripts/run-clang-tidy.sh
        pass_filenames: true
        require_serial: true

  # --------------------------------------------------------------------------
  # Python — ruff (format + lint) is the one tool to rule them all.
  # --------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 5e2fb545eba1ea9dc051f6f962d52fe8f76a9794  # frozen: v0.15.13
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # --------------------------------------------------------------------------
  # CMake — cmake-format keeps our CMakeLists readable and consistent.
  # --------------------------------------------------------------------------
  - repo: https://github.com/cheshirekow/cmake-format-precommit
    rev: e2c2116d86a80e72e7146a06e68b7c228afc6319  # frozen: v0.6.13
    hooks:
      - id: cmake-format
        additional_dependencies: [pyyaml]
      - id: cmake-lint
        additional_dependencies: [pyyaml]

  # --------------------------------------------------------------------------
  # YAML — yamllint catches indentation + style drift in workflows/manifests.
  # --------------------------------------------------------------------------
  - repo: https://github.com/adrienverge/yamllint
    rev: cba56bcde1fdd01c1deb3f945e69764c291a6530  # frozen: v1.38.0
    hooks:
      - id: yamllint
        args: [--config-file=.yamllint.yaml]

  # --------------------------------------------------------------------------
  # Shell — shellcheck for correctness + shfmt for consistent formatting.
  # --------------------------------------------------------------------------
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: 745eface02aef23e168a8afb6b5737818efbea95  # frozen: v0.11.0.1
    hooks:
      - id: shellcheck
        args: [--severity=warning]

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: 05c1426671b9237fb5e1444dd63aa5731bec0dfb  # frozen: v3.13.1-1
    hooks:
      - id: shfmt
        args: [-w, -s, -i, "4", -ci]

  # --------------------------------------------------------------------------
  # Markdown — mdformat keeps docs and wiki consistent.
  # --------------------------------------------------------------------------
  - repo: https://github.com/executablebooks/mdformat
    rev: 2d496dbc18e31b83a1596685347ffe0b6041daf0  # frozen: 1.0.0
    hooks:
      - id: mdformat
        # These files host AUTOGEN blocks whose layout is controlled by
        # scripts/generate-docs.py; mdformat's aggressive table padding
        # would fight the regenerator and cause ping-pong diffs.
        exclude: |
          (?x)^(
              README\.md|
              docs/wiki/.*\.md|
              docs/architecture/.*\.md|
              CHANGELOG\.md
          )$
        # Plugin versions pinned to avoid CI-cache version drift: a
        # stale cache (older mdformat-gfm or mdformat-tables) was
        # rewriting files differently from what local pre-commit
        # produced, causing repeated "files were modified by this
        # hook" failures even after a clean push. Bumping these pins
        # invalidates the pre-commit cache and forces a fresh install
        # of the verified versions on every runner.
        additional_dependencies:
          - mdformat-gfm==1.0.0
          - mdformat-frontmatter==2.0.10
          - mdformat-footnote==0.1.3
          - mdformat-tables==1.0.0

  # --------------------------------------------------------------------------
  # GitHub Actions — actionlint catches workflow mistakes at commit time.
  # --------------------------------------------------------------------------
  - repo: https://github.com/rhysd/actionlint
    rev: 914e7df21a07ef503a81201c76d2b11c789d3fca  # frozen: v1.7.12
    hooks:
      - id: actionlint

  # --------------------------------------------------------------------------
  # Typos — catch spelling mistakes in code, comments, docs.
  # --------------------------------------------------------------------------
  - repo: https://github.com/crate-ci/typos
    rev: bcd7f67b2ec857a4009c6502c2b4fdb5be2bb31b  # frozen: v1
    hooks:
      - id: typos
        args: [--write-changes]

  # --------------------------------------------------------------------------
  # JSON Schema validation — lint our own schemas and validate every
  # plugin / property-inspector / capability manifest committed in-tree
  # against its declared $schema. Catches manifest drift before CI.
  # --------------------------------------------------------------------------
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 943377262562a12b57292fc98fabd7dbf81451fe  # frozen: 0.37.2
    hooks:
      - id: check-metaschema
        name: validate JSON Schemas (Draft 2020-12)
        files: '^docs/schemas/.*\.schema\.json$'
      - id: check-jsonschema
        name: validate plugin manifests
        files: '(^|/)manifest\.json$'
        args: [--schemafile, docs/schemas/plugin_manifest.schema.json]

  # --------------------------------------------------------------------------
  # Docs auto-sync — keep README + wiki AUTOGEN blocks up to date whenever
  # the single source of truth (docs/_data/devices.yaml) or a device backend
  # changes. The regenerator rewrites README.md and docs/wiki/*.md in place.
  # A second hook in CI (`make docs-check`) guards the invariant on main.
  # --------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: regenerate-docs
        name: Regenerate README + wiki AUTOGEN blocks
        entry: python3 scripts/generate-docs.py
        language: python
        pass_filenames: false
        always_run: false
        files: '^(docs/_data/.*\.ya?ml|src/devices/.*|scripts/generate-docs\.py|README\.md|docs/wiki/.*\.md)$'
        additional_dependencies: [pyyaml]

      # Catch the class of bug where adding a configurePreset without the
      # matching buildPreset/testPreset breaks `make test` and CI for new
      # contributors. See scripts/validate_presets.py for details.
      - id: validate-cmake-presets
        name: Validate CMakePresets.json matrix completeness
        entry: python3 scripts/validate_presets.py
        language: python
        pass_filenames: false
        files: '^CMakePresets\.json$'

      # Reject raw USB capture files at commit time. Pitfall 17: a raw
      # *.pcap of an in-use AJAZZ keyboard contains plaintext keystrokes
      # recoverable via tshark or USB-Keyboard-Parser. The hook also
      # rejects any binary file >10 KB under .planning/research/captures/.
      # The global `exclude:` block above silences lint noise on the legacy
      # docs/protocols/captures/.* path; this hook is the authoritative
      # rejection layer and runs on every commit attempt, including under
      # excluded paths. See docs/policies/capture-data-hygiene.md.
      - id: reject-raw-captures
        name: Reject raw USB capture files (CAPTURE-01 / Pitfall 17)
        entry: scripts/reject-raw-captures.sh
        language: system
        pass_filenames: true
        always_run: true

      # Enforce CLAUDE.md "Test names must be ASCII-only" rule. Three
      # Windows CI failures in the 2026-05-17 session traced to Unicode
      # chars in TEST_CASE titles getting mangled by the Win32 CMD
      # codepage; this hook blocks the recurrence at commit time.
      - id: check-test-names-ascii
        name: TEST_CASE / SECTION titles must be ASCII only
        entry: scripts/check-test-names-ascii.sh
        language: system
        files: '^tests/.*\.cpp$'
        pass_filenames: true

  # --------------------------------------------------------------------------
  # Commitlint — enforce Conventional Commits on the commit message.
  # --------------------------------------------------------------------------
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: 3db014c16a9d31997ab8c07a4d61fcce936c8f0d  # frozen: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - --strict
          - --verbose
          - feat
          - fix
          - docs
          - style
          - refactor
          - perf
          - test
          - build
          - ci
          - chore
          - revert
