name: Bug report
description: Something is not working as expected.
labels: [ bug, triage ]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please include as much detail
        as possible so we can reproduce and fix it quickly.

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - Windows
        - macOS
    validations: { required: true }

  - type: input
    id: version
    attributes:
      label: Application version
      description: Output of `ajazz-control-center --version` or the installer tag.
    validations: { required: true }

  - type: dropdown
    id: device_family
    attributes:
      label: Device family
      options:
        - Stream deck
        - Keyboard
        - Mouse
        - Not device-specific
    validations: { required: true }

  - type: input
    id: device_model
    attributes:
      label: Device model (if applicable)
      placeholder: e.g. AJAZZ AKP153E
    validations: { required: false }

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What did you do? What did you expect? What actually happened?
    validations: { required: true }

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant log output. Start the app with `AJAZZ_LOG=debug`.
      render: shell
