name: CI

# Build + test on Linux / Windows / macOS. Linting lives in its own
# workflow (`lint.yml`) so formatting churn does not block builds.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Build & test matrix — Linux, Windows, macOS.
  # ---------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.os }} · ${{ matrix.build_type }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            preset: linux-release
            build_type: Release
          - os: windows-2022
            preset: windows-release
            build_type: Release
          - os: macos-14
            preset: macos-release
            build_type: Release

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0
      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
              build-essential cmake ninja-build pkg-config \
              libudev-dev libusb-1.0-0-dev libhidapi-dev \
              libgl1-mesa-dev libxkbcommon-dev libxcb1-dev \
              libxcb-cursor-dev libxkbcommon-x11-dev \
              python3-dev python3-pip

      - name: Install macOS deps
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install ninja hidapi pkg-config

      - name: Install Windows deps
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@a102174a2b586eec2ea151a69e6fd14404a8ce7c  # v1.13.0
      - name: Install Qt 6
        uses: jurplel/install-qt-action@12aa0336e1e410b3c6dff5e0722547f7a37e8c60  # v4.2.1
        with:
          version: 6.7.3
          cache: true
          modules: qtshadertools

      # ---- Python ---------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.11"

      # ---- Configure, build, test -----------------------------------------
      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }}

      # ---- Python tests ---------------------------------------------------
      - name: Install Python package
        run: pip install -e .[dev]

      - name: Run Python tests
        run: pytest python/ -q

  # ---------------------------------------------------------------------------
  # Coverage — Linux debug + gcov/lcov.
  # ---------------------------------------------------------------------------
  coverage:
    name: Code coverage
    runs-on: ubuntu-24.04
    needs: build
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build lcov libudev-dev \
              libusb-1.0-0-dev libhidapi-dev python3-dev \
              libgl1-mesa-dev libxkbcommon-dev

      - uses: jurplel/install-qt-action@12aa0336e1e410b3c6dff5e0722547f7a37e8c60  # v4.2.1
        with:
          version: 6.7.3
          cache: true

      - name: Configure
        run: |
          cmake -S . -B build-cov -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DAJAZZ_ENABLE_COVERAGE=ON \
            -DAJAZZ_ENABLE_WERROR=OFF

      - name: Build & test
        run: |
          cmake --build build-cov
          ctest --test-dir build-cov --output-on-failure

      - name: Generate report
        run: |
          lcov --capture --directory build-cov --output-file coverage.info \
            --ignore-errors mismatch,negative,source,unused
          lcov --remove coverage.info '/usr/*' '*/_deps/*' '*/tests/*' \
            --output-file coverage.info \
            --ignore-errors unused
          lcov --list coverage.info

      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: coverage
          path: coverage.info

  # ---------------------------------------------------------------------------
  # Sanitizer matrix — Linux only (closes #41).
  # ASan + UBSan run together (cheap, catches the most defects). TSan runs in
  # its own job because the instrumentation is incompatible with ASan and the
  # GIL of the embedded Python interpreter currently prevents running TSan with
  # the full app, so we restrict the suite to the C++ unit and integration
  # tests where we exercise the EventBus concurrency invariants.
  # ---------------------------------------------------------------------------
  sanitizers:
    name: Sanitizers · ${{ matrix.flavour }}
    runs-on: ubuntu-24.04
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavour: ASan+UBSan
            cmake_flags: -DAJAZZ_ENABLE_SANITIZERS=ON
            asan_options: detect_leaks=1:strict_string_checks=1:check_initialization_order=1
            ubsan_options: print_stacktrace=1:halt_on_error=1
            tsan_options: ""
          - flavour: TSan
            cmake_flags: -DAJAZZ_ENABLE_TSAN=ON
            asan_options: ""
            ubsan_options: ""
            tsan_options: halt_on_error=1:second_deadlock_stack=1
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
              build-essential cmake ninja-build pkg-config \
              libudev-dev libusb-1.0-0-dev libhidapi-dev \
              libgl1-mesa-dev libxkbcommon-dev libxcb1-dev \
              libxcb-cursor-dev libxkbcommon-x11-dev \
              python3-dev python3-pip
      - uses: jurplel/install-qt-action@12aa0336e1e410b3c6dff5e0722547f7a37e8c60  # v4.2.1
        with:
          version: 6.7.3
          cache: true
          modules: qtshadertools

      - name: Configure (Debug + sanitizer)
        run: |
          cmake -S . -B build-san -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DAJAZZ_ENABLE_WERROR=OFF \
            -DAJAZZ_BUILD_APP=OFF \
            -DAJAZZ_BUILD_PYTHON_HOST=OFF \
            ${{ matrix.cmake_flags }}

      - name: Build
        run: cmake --build build-san --target ajazz_unit_tests ajazz_integration_tests

      - name: Run unit + integration tests
        env:
          ASAN_OPTIONS: ${{ matrix.asan_options }}
          UBSAN_OPTIONS: ${{ matrix.ubsan_options }}
          TSAN_OPTIONS: ${{ matrix.tsan_options }}
        run: ctest --test-dir build-san --output-on-failure
