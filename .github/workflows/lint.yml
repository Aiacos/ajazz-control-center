name: Lint

# Runs every pre-commit hook on push + PR. On a PR from within the same
# repo (i.e. not a fork), if any hook auto-fixed something, the fixes are
# pushed back as a follow-up commit so reviewers get a clean tree without
# the contributor having to re-run anything locally.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================================================
  # Fast unified lint — runs every pre-commit hook in the same environment
  # that contributors use locally. If anything needs fixing, the job fails
  # and, when possible, a follow-up "auto-fix" commit is pushed to the PR.
  # ==========================================================================
  pre-commit:
    name: pre-commit (all hooks)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: write      # needed to push auto-fix commits
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # Full history so pre-commit can diff accurately.
          fetch-depth: 0
          # For PRs from the same repo, check out the head branch so we
          # can push auto-fixes back.
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system linters
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang-format-18 clang-tidy-18 \
            shellcheck
          sudo update-alternatives --install /usr/bin/clang-format clang-format \
              /usr/bin/clang-format-18 100
          sudo update-alternatives --install /usr/bin/clang-tidy clang-tidy \
              /usr/bin/clang-tidy-18 100

      - name: Cache pre-commit
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57  # v4.2.0
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: pre-commit-${{ runner.os }}-

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run all hooks
        id: run
        continue-on-error: true
        run: |
          pre-commit run --all-files --show-diff-on-failure --color always

      - name: Commit auto-fixes (PR from same repo)
        if: |
          steps.run.outcome == 'failure' &&
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        uses: stefanzweifel/git-auto-commit-action@8621497c8c39c72f3e2a999a26b4ca1b5058a842  # v5.0.1
        with:
          commit_message: "style: apply pre-commit auto-fixes"
          commit_user_name: ajazz-bot
          commit_user_email: ajazz-bot@users.noreply.github.com

      - name: Re-run hooks after auto-fix
        if: steps.run.outcome == 'failure'
        run: pre-commit run --all-files

  # ==========================================================================
  # Clang-tidy with compile_commands.json — real static analysis requiring
  # a CMake configure + build cache. Separate job so it can run in parallel.
  # ==========================================================================
  clang-tidy:
    name: clang-tidy (static analysis)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Install toolchain
        # Qt is installed via install-qt-action below; here we only install
        # the system bits CMake / clang-tidy need to be able to configure
        # the project (X11 dev headers Qt links against, libudev, python).
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build g++ pkg-config \
            python3-dev python3-pip \
            libudev-dev libsystemd-dev \
            libusb-1.0-0-dev libhidapi-dev \
            libgl1-mesa-dev libxkbcommon-dev libxcb1-dev \
            libxcb-cursor-dev libxkbcommon-x11-dev \
            clang-tidy-18
          sudo update-alternatives --install /usr/bin/clang-tidy clang-tidy \
              /usr/bin/clang-tidy-18 100

      - name: Install Qt 6.7
        # Project requires Qt >= 6.7 (see top-level CMakeLists.txt); the
        # qt6-* apt packages on ubuntu-24.04 only provide Qt 6.4.
        uses: jurplel/install-qt-action@12aa0336e1e410b3c6dff5e0722547f7a37e8c60  # v4.2.1
        with: { version: 6.7.3, cache: true }

      - name: Configure
        run: cmake --preset dev -DAJAZZ_ENABLE_WERROR=OFF

      - name: Run clang-tidy on every translation unit
        run: |
          if [ ! -f build/dev/compile_commands.json ]; then
            echo "::error::compile_commands.json missing — cmake configure failed"
            exit 1
          fi
          # Parallelise across cores; tidy returns non-zero on its first error.
          # Use a shared exit-status file so a failure in any TU fails the job.
          status_file=$(mktemp)
          echo 0 > "$status_file"
          # shellcheck disable=SC2016  # $1/$2 are sh -c positional args, must stay literal
          find src -name '*.cpp' -print0 | \
            xargs -0 -P"$(nproc)" -I{} sh -c \
              'clang-tidy -p build/dev --quiet "$1" || echo $? > "$2"' \
              _ {} "$status_file"
          rc=$(cat "$status_file")
          rm -f "$status_file"
          [ "$rc" = 0 ]

  # ==========================================================================
  # Documentation linting — no C++ / Qt required, very fast.
  # ==========================================================================
  docs:
    name: docs (markdown + links)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"

      - name: Install mdformat + linkcheck
        run: pip install mdformat mdformat-gfm mdformat-tables mdformat-frontmatter pyyaml

      - name: README + wiki AUTOGEN blocks are in sync
        run: python3 scripts/generate-docs.py --check

      - name: Check Markdown formatting (via pre-commit, single source of truth)
        # Delegate to the pre-commit mdformat hook so the exclude list
        # stays in lockstep with .pre-commit-config.yaml and contributors
        # never see CI-only formatting failures.
        run: |
          pip install pre-commit
          pre-commit run mdformat --all-files --color always

      - name: Lychee (link checker)
        uses: lycheeverse/lychee-action@f81112d0d2814ded911bd23e3beaa9dda9093915  # v2.1.0
        with:
          args: --verbose --no-progress --exclude-loopback --exclude-mail .
          fail: false   # Reports broken links as a warning, does not fail CI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
