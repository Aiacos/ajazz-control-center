name: Publish wiki

# GitHub Wiki is only available on public repositories for free accounts,
# or on paid (Team / Enterprise) accounts for private repositories. If the
# repository is private on a free plan, `has_wiki` will be false and this
# workflow exits gracefully. In all other cases the contents of
# `docs/wiki/` are mirrored to the GitHub Wiki — provided the wiki repo
# has been initialized once via the GitHub UI.

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/wiki/**'
      - '.github/workflows/wiki.yml'
  workflow_dispatch:

# Cancel any in-flight wiki sync when a newer one arrives so the GitHub
# Wiki always reflects the most recent push instead of an older queued run.
concurrency:
  group: wiki-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  publish:
    name: Sync docs/wiki → GitHub Wiki
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write           # push to <repo>.wiki.git via GITHUB_TOKEN
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Decide whether to sync
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # 1. Is the wiki feature enabled in repo settings? (free + private
          # repos return false; we exit gracefully without failing CI.)
          has_wiki=$(gh api "repos/${{ github.repository }}" --jq '.has_wiki')
          if [ "$has_wiki" != "true" ]; then
            echo "::notice::Wiki feature is disabled (has_wiki=$has_wiki). Skipping. The wiki source remains available under docs/wiki/ in the repo."
            echo "should_sync=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 2. has_wiki=true means the feature is enabled, but the underlying
          # *.wiki.git repo only materialises on github.com after a human
          # creates the first page via the Wiki UI. There is no API to seed
          # it programmatically (no wiki endpoints in the REST/GraphQL API,
          # and `git push` to the empty URL returns "repository not found").
          # Detect this chicken-and-egg state via ls-remote and emit a
          # one-time setup notice without failing the workflow.
          wiki_url="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git"
          if git ls-remote --quiet "$wiki_url" HEAD >/dev/null 2>&1; then
            echo "should_sync=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::notice::Wiki feature is enabled but the wiki repository is empty. One-time manual step required: visit https://github.com/${{ github.repository }}/wiki/_new and save any page (its content can be replaced immediately afterwards). All subsequent pushes will sync docs/wiki/ automatically."
          echo "should_sync=false" >> "$GITHUB_OUTPUT"

      - name: Push wiki
        if: steps.check.outputs.should_sync == 'true'
        uses: Andrew-Chen-Wang/github-wiki-action@64efa0a9436db17670a2259e0ac249d6f08bb352  # v5.0.4
        with:
          path: docs/wiki
