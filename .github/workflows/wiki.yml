name: Publish wiki

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/wiki/**'
      - '.github/workflows/wiki.yml'
  workflow_dispatch:

jobs:
  publish:
    name: Sync docs/wiki → GitHub Wiki
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Push wiki
        uses: Andrew-Chen-Wang/github-wiki-action@v4
        with:
          path: docs/wiki
