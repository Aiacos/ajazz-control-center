# SPDX-License-Identifier: GPL-3.0-or-later
# Scans the repository for committed secrets using gitleaks.
name: Secret scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '23 4 * * 1'

concurrency:
  group: gitleaks-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@83373cf2f8c4db6e24b41c1a9b086bb9619e9cd3 # v2.3.7
        env:
          # gitleaks-action v2 hard-requires GITHUB_TOKEN to scan pull
          # requests; without it the action exits with
          # "🛑 GITHUB_TOKEN is now required to scan pull requests".
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is required for organisation accounts; for personal
          # accounts the action runs without it. Set if you need org-level
          # reporting.
          GITLEAKS_NOTIFY_USER_LIST: '@Aiacos'
