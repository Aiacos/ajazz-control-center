# SPDX-License-Identifier: GPL-3.0-or-later
# Scans the repository for committed secrets using gitleaks.
name: Secret scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '23 4 * * 1'

concurrency:
  group: gitleaks-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          # gitleaks-action v2 hard-requires GITHUB_TOKEN to scan pull
          # requests; without it the action exits with
          # "🛑 GITHUB_TOKEN is now required to scan pull requests".
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is required for organisation accounts; for personal
          # accounts the action runs without it. Set if you need org-level
          # reporting.
          GITLEAKS_NOTIFY_USER_LIST: '@Aiacos'
