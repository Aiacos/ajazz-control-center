name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to publish (e.g. v0.1.0)
        required: true

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Linux — .deb + .rpm via CPack
  # ---------------------------------------------------------------------------
  linux-packages:
    name: Linux · deb + rpm
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config \
              libudev-dev libusb-1.0-0-dev libhidapi-dev \
              libgl1-mesa-dev libxkbcommon-dev libxcb1-dev \
              libxcb-cursor-dev libxkbcommon-x11-dev \
              python3-dev rpm file
      - uses: jurplel/install-qt-action@12aa0336e1e410b3c6dff5e0722547f7a37e8c60  # v4.2.1
        with: { version: 6.7.3, cache: true }
      - name: Configure
        run: cmake --preset linux-release
      - name: Build
        run: cmake --build --preset linux-release
      - name: Package (deb + rpm)
        working-directory: build/linux-release
        run: |
          cpack -G DEB
          cpack -G RPM
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: linux-packages
          path: |
            build/linux-release/*.deb
            build/linux-release/*.rpm

  # ---------------------------------------------------------------------------
  # Linux — Flatpak bundle
  # ---------------------------------------------------------------------------
  linux-flatpak:
    name: Linux · Flatpak
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    container:
      image: bilelmoussaoui/flatpak-github-actions:kde-6.7
      options: --privileged
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: flatpak/flatpak-github-actions/flatpak-builder@3ec0682d23424395d497df2ae894aa0c5cd79c6e  # v6.5
        with:
          bundle: ajazz-control-center.flatpak
          manifest-path: packaging/flatpak/io.github.Aiacos.AjazzControlCenter.yml
          cache-key: flatpak-builder-${{ github.sha }}

  # ---------------------------------------------------------------------------
  # Windows — MSI installer via CPack/WIX
  # ---------------------------------------------------------------------------
  windows-msi:
    name: Windows · MSI
    runs-on: windows-2022
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ilammy/msvc-dev-cmd@a102174a2b586eec2ea151a69e6fd14404a8ce7c  # v1.13.0
      - uses: jurplel/install-qt-action@12aa0336e1e410b3c6dff5e0722547f7a37e8c60  # v4.2.1
        with: { version: 6.7.3, cache: true }
      - name: Configure
        run: cmake --preset windows-release
      - name: Build
        run: cmake --build --preset windows-release
      - name: Package (MSI + ZIP)
        working-directory: build/windows-release
        run: |
          cpack -G WIX
          cpack -G ZIP
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: windows-packages
          path: |
            build/windows-release/*.msi
            build/windows-release/*.zip

  # ---------------------------------------------------------------------------
  # macOS — universal DMG (x86_64 + arm64)
  # ---------------------------------------------------------------------------
  macos-dmg:
    name: macOS · Universal DMG
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Install deps
        run: brew install ninja create-dmg
      - uses: jurplel/install-qt-action@12aa0336e1e410b3c6dff5e0722547f7a37e8c60  # v4.2.1
        with: { version: 6.7.3, cache: true }
      - name: Configure (universal)
        run: |
          cmake -S . -B build/macos-release -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"
      - name: Build
        run: cmake --build build/macos-release
      - name: Package (DMG + TGZ)
        working-directory: build/macos-release
        run: |
          cpack -G DragNDrop
          cpack -G TGZ
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: macos-packages
          path: |
            build/macos-release/*.dmg
            build/macos-release/*.tar.gz

  # ---------------------------------------------------------------------------
  # Publish GitHub release
  # ---------------------------------------------------------------------------
  publish:
    name: Publish GitHub release
    needs: [ linux-packages, linux-flatpak, windows-msi, macos-dmg ]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4.1.8
        with: { path: dist }
      - name: List artifacts
        run: find dist -type f
      - name: Generate SHA256 checksums
        # Provides reproducible integrity verification for users.
        # Mitigates SEC-014 (release artifacts published unsigned).
        working-directory: dist
        run: |
          set -euo pipefail
          mapfile -t files < <(find . -type f \( \
              -name '*.deb' -o -name '*.rpm' -o -name '*.msi' -o \
              -name '*.zip' -o -name '*.dmg' -o -name '*.tar.gz' -o \
              -name '*.flatpak' \) | sort)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No artifacts found to checksum"; exit 1
          fi
          sha256sum "${files[@]}" > SHA256SUMS
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS
      - name: Create release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2.6.2
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            dist/linux-packages/*
            dist/windows-packages/*
            dist/macos-packages/*
            dist/*.flatpak
            dist/SHA256SUMS
