---
# SPDX-License-Identifier: GPL-3.0-or-later
#
# Nightly rolling-release workflow.
#
# Triggers on every push to main. Builds installable artifacts (Linux .deb /
# .rpm / .flatpak, Windows .msi / .zip portable, macOS universal .dmg) and
# (re)publishes a single GitHub pre-release tagged "nightly" with the latest
# binaries, so users / contributors can try the bleeding edge without having
# to build from source.

name: Nightly

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    # 03:17 UTC every day, only runs against main.
    - cron: '17 3 * * *'

permissions:
  contents: write

concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Linux — .deb + .rpm
  # ---------------------------------------------------------------------------
  linux:
    name: Linux · deb + rpm
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config \
              libudev-dev libusb-1.0-0-dev libhidapi-dev \
              libgl1-mesa-dev libxkbcommon-dev libxcb1-dev \
              libxcb-cursor-dev libxkbcommon-x11-dev \
              python3-dev rpm file
      - uses: jurplel/install-qt-action@12aa0336e1e410b3c6dff5e0722547f7a37e8c60  # v4.2.1
        with: { version: 6.7.3, cache: true }
      - name: Configure
        run: cmake --preset linux-release
      - name: Build
        run: cmake --build --preset linux-release
      - name: Package (deb + rpm)
        working-directory: build/linux-release
        run: |
          cpack -G DEB
          cpack -G RPM
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: nightly-linux
          path: |
            build/linux-release/*.deb
            build/linux-release/*.rpm

  # ---------------------------------------------------------------------------
  # Windows — MSI + portable ZIP
  # ---------------------------------------------------------------------------
  windows:
    name: Windows · MSI + ZIP
    runs-on: windows-2022
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0
      - uses: ilammy/msvc-dev-cmd@a102174a2b586eec2ea151a69e6fd14404a8ce7c  # v1.13.0
      - uses: jurplel/install-qt-action@12aa0336e1e410b3c6dff5e0722547f7a37e8c60  # v4.2.1
        with: { version: 6.7.3, cache: true }
      - name: Configure
        run: cmake --preset windows-release
      - name: Build
        run: cmake --build --preset windows-release
      - name: Package (MSI + ZIP)
        working-directory: build/windows-release
        run: |
          cpack -G WIX
          cpack -G ZIP
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: nightly-windows
          path: |
            build/windows-release/*.msi
            build/windows-release/*.zip

  # ---------------------------------------------------------------------------
  # macOS — universal DMG
  # ---------------------------------------------------------------------------
  macos:
    name: macOS · Universal DMG
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0
      - name: Install deps
        run: brew install ninja create-dmg
      - uses: jurplel/install-qt-action@12aa0336e1e410b3c6dff5e0722547f7a37e8c60  # v4.2.1
        with: { version: 6.7.3, cache: true }
      - name: Configure (universal)
        run: |
          cmake -S . -B build/macos-release -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"
      - name: Build
        run: cmake --build build/macos-release
      - name: Package (DMG + TGZ)
        working-directory: build/macos-release
        run: |
          cpack -G DragNDrop
          cpack -G TGZ
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: nightly-macos
          path: |
            build/macos-release/*.dmg
            build/macos-release/*.tar.gz

  # ---------------------------------------------------------------------------
  # Publish / refresh the rolling "nightly" pre-release
  # ---------------------------------------------------------------------------
  publish:
    name: Publish nightly pre-release
    needs: [ linux, windows, macos ]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0
        with: { fetch-depth: 0 }

      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4.1.8
        with: { path: dist }

      - name: List artifacts
        run: find dist -type f

      - name: Generate SHA256 checksums
        # Allows users to verify they got the exact build from this commit,
        # even though the "nightly" tag itself is force-moved each run.
        # Mitigates SEC-015 (force-moving nightly tag obscures provenance).
        working-directory: dist
        run: |
          set -euo pipefail
          mapfile -t files < <(find . -type f \( \
              -name '*.deb' -o -name '*.rpm' -o -name '*.msi' -o \
              -name '*.zip' -o -name '*.dmg' -o -name '*.tar.gz' \) | sort)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No artifacts found to checksum"; exit 1
          fi
          sha256sum "${files[@]}" > SHA256SUMS
          # Embed commit SHA in the checksum file so users can prove which
          # build they downloaded even after the tag has moved.
          {
            echo "# Nightly build · commit ${GITHUB_SHA}"
            echo "# Run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            cat SHA256SUMS
          } > SHA256SUMS.txt
          mv SHA256SUMS.txt SHA256SUMS
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS

      - name: Move / re-tag "nightly" to current commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Force-update tag so the rolling release always points at HEAD.
          git tag -fa nightly -m "Rolling nightly · ${GITHUB_SHA::7}"
          git push origin -f nightly

      - name: Publish / update release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2.6.2
        with:
          tag_name: nightly
          name: "Nightly · ${{ github.sha }}"
          body: |
            Rolling pre-release built from `main`.

            Commit: `${{ github.sha }}`
            Run: <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}>

            > These builds are **untested** and not signed for production
            > use. They are intended for early testers and contributors.
            > For stable builds, see the tagged releases.
          prerelease: true
          fail_on_unmatched_files: false
          files: |
            dist/nightly-linux/*
            dist/nightly-windows/*
            dist/nightly-macos/*
            dist/SHA256SUMS
