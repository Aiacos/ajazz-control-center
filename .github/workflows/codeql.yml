# SPDX-License-Identifier: GPL-3.0-or-later
# CodeQL static analysis for C++ and Python.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday at 06:17 UTC.
    - cron: '17 6 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    # ubuntu-24.04 ships gcc-13/libstdc++-13 which has full <format>
    # support; the project source uses std::format unconditionally via
    # ajazz/core/logger.hpp so older runners cannot compile it.
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: cpp
            build-mode: manual
          - language: python
            build-mode: none
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8c78abb9b62512e3c45dea6559ffd924ed8549c8 # v3.28.0
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: +security-and-quality

      - name: Install Linux build dependencies
        if: matrix.language == 'cpp'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ninja-build cmake \
            libusb-1.0-0-dev libhidapi-dev libudev-dev \
            libgl1-mesa-dev libxkbcommon-dev

      - name: Install Qt
        if: matrix.language == 'cpp'
        uses: jurplel/install-qt-action@12aa0336e1e410b3c6dff5e0722547f7a37e8c60 # v4.2.1
        with:
          version: '6.7.3'
          modules: 'qtshadertools'

      - name: Build (C++)
        if: matrix.language == 'cpp'
        run: |
          cmake --preset dev -DAJAZZ_BUILD_PYTHON_HOST=OFF -DAJAZZ_BUILD_TESTS=OFF
          cmake --build --preset dev -j 2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8c78abb9b62512e3c45dea6559ffd924ed8549c8 # v3.28.0
        with:
          category: '/language:${{ matrix.language }}'
