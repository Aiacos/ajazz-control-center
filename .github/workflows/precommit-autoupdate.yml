# ============================================================================
# Pre-commit auto-update
#
# Bumps every pre-commit hook to its latest tagged release once a week and
# opens a pull request with the diff. The follow-up PR is then run through
# the regular Lint workflow (which itself auto-fixes any new style rule),
# so the human reviewer only has to merge a green PR.
#
# Why this exists:
#   * pre-commit hooks pin specific revisions to keep CI reproducible.
#   * Without automation, those pins quietly fall behind upstream and we
#     miss security fixes / new lint rules.
#   * `pre-commit autoupdate` is the canonical way to bump them.
# ============================================================================
name: Pre-commit auto-update

on:
  schedule:
    # Mondays at 06:00 UTC. Cron is best-effort — GitHub may delay it
    # under load; that is fine for a weekly maintenance task.
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  autoupdate:
    name: pre-commit autoupdate
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run autoupdate
        run: pre-commit autoupdate --freeze

      - name: Re-run hooks against the bumped versions
        # Some hooks change formatting rules between releases (e.g. ruff,
        # mdformat). Run them once so the PR includes the resulting
        # auto-fixes instead of failing on the contributor's first push.
        run: |
          pre-commit run --all-files || true

      - name: Open pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/precommit-autoupdate
          commit-message: "chore(deps): bump pre-commit hooks"
          title: "chore(deps): bump pre-commit hooks"
          body: |
            Automated weekly bump of every pre-commit hook to its latest
            tagged release (`pre-commit autoupdate --freeze`).

            The bumped versions have been re-run across the whole tree;
            any resulting auto-fixes are included in this PR so the Lint
            workflow can land on it cleanly.

            Generated by `.github/workflows/precommit-autoupdate.yml`.
          labels: |
            automation
            dependencies
          delete-branch: true
