<?xml version="1.0" encoding="UTF-8"?>
<!--
  Ajazz Control Center application icon (legacy generic mark slot).

  This file is kept at its historical path under resources/icons/app.svg
  because it is referenced by the desktop-entry / installer / theme-icon
  pipelines that ship under share/icons/hicolor/scalable/apps. To keep
  every surface (README, window decoration, tray, .desktop entry, theme
  cache) showing the same artwork, the contents are intentionally kept
  identical to resources/branding/app.svg — the brand-aligned mark.

  If you intend to rebrand the project, edit BOTH files in lockstep, or
  override AJAZZ_BRAND_DIR with a directory that contains a different
  app.svg (resources/branding/ takes precedence over this file via the
  CMake aliasing in src/app/CMakeLists.txt).

  Design notes (clean-room redesign — original artwork by Aiacos):
    * Triangular "A" monogram with an inner droplet / loop, evoking the
      AJAZZ visual identity. Geometry is original; no vendor artwork is
      reused or traced.
    * 128x128 viewBox, single accent colour (#E63946) so the icon scales
      cleanly down to 16px without losing identity.
    * Rounded square dark-gradient background keeps parity with the dark
      Material theme used in the QML app.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#1B1D24"/>
      <stop offset="100%" stop-color="#0A0B10"/>
    </linearGradient>
  </defs>

  <!-- Rounded dark background. -->
  <rect x="2" y="2" width="124" height="124" rx="24" fill="url(#bg)"/>

  <!-- Monogram "A": outer triangle + inner droplet, brand red. -->
  <g fill="none" stroke="#E63946" stroke-linejoin="round" stroke-linecap="round">
    <!-- Outer A triangle (rounded apex, open base for stability at small sizes). -->
    <path d="M 64 22
             L 102 100
             L 26  100
             Z"
          stroke-width="7"/>
    <!-- Inner droplet / loop forming the counter of the A. -->
    <path d="M 64 44
             C 76 60 80 76 72 88
             C 64 100 52 96 50 84
             C 48 70 56 56 64 44 Z"
          stroke-width="5"/>
  </g>
</svg>
